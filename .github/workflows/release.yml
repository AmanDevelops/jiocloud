name: Release

on:
  push:
    tags:
      - "v*"

# Needed to create the GitHub Release and upload assets.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Build ${{ matrix.goarch }} binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -eu
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p build
          go build -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o build/jiocloud ./cmd/jiocloud
          tar -C build -czf "jiocloud_${VERSION}_linux_${GOARCH}.tar.gz" jiocloud
          rm build/jiocloud

      - uses: actions/upload-artifact@v4
        with:
          name: jiocloud-${{ matrix.goarch }}
          path: jiocloud_*.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -eu
          cd dist
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
